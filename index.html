<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.png" type="image/png" />

    <meta name="author" content="Paris Tout Services" />

    <meta property="og:title" content="Plombier Paris | Urgence plomberie & gaz Île-de-France – Paris Tout Services" />
    <meta property="og:description" content="Expert plombier à Paris et Île-de-France. Dépannage plomberie, installation gaz, rénovation salle de bain. Devis gratuit." />

    <!-- Silktide Cookie Consent -->
    <link rel="stylesheet" id="silktide-consent-manager-css" href="https://cdn.jsdelivr.net/gh/silktide/consent-manager@main/silktide-consent-manager.css">
    <style>
      #stcm-wrapper {
        --primaryColor: #2563EB !important;
        --iconBackgroundColor: #2563EB !important;
        --backgroundColor: #ffffff !important;
        --textColor: #000000 !important;
        --buttonTextColor: #ffffff !important;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/gh/silktide/consent-manager@main/silktide-consent-manager.js"></script>
    <script>
      window.addEventListener('DOMContentLoaded', function() {
        if (typeof window.silktideConsentManager !== 'undefined') {
          window.silktideConsentManager.init({
            consentTypes: [
              {
                id: 'essential',
                label: 'Nécessaires',
                description: 'Ces cookies sont nécessaires au bon fonctionnement du site et ne peuvent pas être désactivés.',
                required: true
              },
              {
                id: 'analytics',
                label: 'Analytiques',
                description: 'Ces cookies nous aident à améliorer le site en suivant les pages les plus populaires et la façon dont les visiteurs naviguent.',
                defaultValue: true,
                gtag: 'analytics_storage'
              },
              {
                id: 'advertising',
                label: 'Publicité',
                description: 'Ces cookies offrent des fonctionnalités supplémentaires et une personnalisation pour améliorer votre expérience.',
                defaultValue: false,
                gtag: ['ad_storage', 'ad_user_data', 'ad_personalization']
              }
            ],
            text: {
              prompt: {
                description: '<p>Nous utilisons des cookies pour améliorer votre expérience, mesurer l\'audience et proposer des contenus adaptés. <a href="https://www.paristoutservices.com/politique-confidentialite" target="_blank">Politique de confidentialité.</a></p>',
                acceptAllButtonText: 'Accepter',
                acceptAllButtonAccessibleLabel: 'Accepter tous les cookies',
                rejectNonEssentialButtonText: 'Refuser',
                rejectNonEssentialButtonAccessibleLabel: 'Refuser les cookies non essentiels',
                preferencesButtonText: 'Paramètres',
                preferencesButtonAccessibleLabel: 'Gérer les préférences de cookies'
              },
              preferences: {
                title: 'Personnalisez vos préférences de cookies',
                description: '<p>Nous respectons votre droit à la vie privée. Vous pouvez refuser certains types de cookies. Vos préférences s\'appliqueront à l\'ensemble de notre site web.</p>'
              }
            },
            position: {
              prompt: 'bottomLeft',
              icon: 'bottomLeft'
            },
            onConsentChange: function() {
              // Force hide the banner AND the cookie icon after consent is given
              var wrapper = document.getElementById('stcm-wrapper');
              if (wrapper) {
                wrapper.style.display = 'none';
              }
            }
          });
        }

        // Fallback: observe clicks on accept/reject buttons and hide banner
        document.addEventListener('click', function(e) {
          var target = e.target;
          if (target && (target.closest('[data-stcm-accept-all]') || target.closest('[data-stcm-reject-non-essential]'))) {
            setTimeout(function() {
              var wrapper = document.getElementById('stcm-wrapper');
              if (wrapper) wrapper.style.display = 'none';
            }, 300);
          }
        }, true);
      });
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
